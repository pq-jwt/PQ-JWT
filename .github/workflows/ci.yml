name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # ⬅️ ADDED: Required for OIDC trusted publishing

jobs:
  test:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm test

  ecosystem:
    name: JS/TS ecosystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run test:ecosystem

  publish:
    needs: [test, ecosystem]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    # ⬅️ ADDED: Explicit permissions for publish job
    permissions:
      contents: read
      id-token: write  # Required for OIDC
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false  # ⬅️ ADDED: Never cache in release builds
      
      - run: npm install
      
      # npm: Trusted Publisher must be pq-jwt/PQ-JWT (not pq-jwt/core), workflow ci.yml
      # Publishing must use OIDC — "disallow tokens" blocks NPM_TOKEN secrets.
      - name: Verify npm auth (OIDC)
        run: npm whoami

      - name: Publish to npm
        run: npm publish --provenance --access public
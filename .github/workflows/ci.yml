name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write  # ⬅️ ADDED: Required for OIDC trusted publishing

jobs:
  test:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm test

  ecosystem:
    name: JS/TS ecosystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run test:ecosystem

  publish:
    needs: [test, ecosystem]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    # ⬅️ ADDED: Explicit permissions for publish job
    permissions:
      contents: read
      id-token: write  # Required for OIDC
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false  # ⬅️ ADDED: Never cache in release builds
      
      - run: npm install
      
      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # OIDC: configure Trusted Publisher on npm for @pq-jwt/core (pq-jwt/PQ-JWT, ci.yml).
      # Until then, org secret NPM_TOKEN is used. Remove NODE_AUTH_TOKEN after OIDC works.
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}